<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #fff;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding: 8px 12px;
      border-radius: 8px;
      background: #1a1a1a;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
    }
    .dot.connected { background: #22c55e; }
    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
      margin-top: 12px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1a1a1a;
      color: #e5e5e5;
      font-size: 13px;
      outline: none;
    }
    input:focus { border-color: #555; }
    button {
      width: 100%;
      margin-top: 16px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    #connectBtn {
      background: #fff;
      color: #000;
    }
    #disconnectBtn {
      background: #333;
      color: #e5e5e5;
      display: none;
    }
  </style>
</head>
<body>
  <h1>DevMaker</h1>
  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Disconnected</span>
  </div>

  <label>Backend URL</label>
  <input type="text" id="backendUrl" placeholder="https://your-app.railway.app">

  <label>Account ID</label>
  <input type="text" id="accountId" placeholder="paste from dashboard">

  <button id="connectBtn">Connect</button>
  <button id="disconnectBtn">Disconnect</button>

  <script src="popup.js"></script>
</body>
</html>
